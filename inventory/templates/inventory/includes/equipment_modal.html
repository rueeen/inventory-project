<div class="modal fade"
     id="equipmentModal"
     tabindex="-1"
     aria-labelledby="equipmentModalLabel"
     aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="equipmentModalLabel">Seleccionar equipo</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <input type="text"
                 id="equipment-search"
                 class="form-control"
                 placeholder="Buscar equipo por nombre o código" />
        </div>
        <div id="equipment-results" class="list-group">
          <div class="text-muted">Escribe para buscar equipos.</div>
        </div>
      </div>
    </div>
  </div>
</div>
