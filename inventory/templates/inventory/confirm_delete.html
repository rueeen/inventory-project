{% extends "inventory/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger shadow-lg">
            <div class="card-body text-center p-4">
                <i class="bi bi-exclamation-triangle text-danger display-3 mb-3"></i>
                <h3 class="card-title">¿Confirmar eliminación?</h3>
                <p class="text-muted">
                    Estás a punto de eliminar permanentemente: <br>
                    <strong>"{{ object }}"</strong>
                </p>
                <hr>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">Sí, eliminar</button>
                        <a href="javascript:history.back()" class="btn btn-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
