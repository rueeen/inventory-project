{% extends "inventory/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body text-center p-5">
                <div class="mb-4">
                    <i class="bi bi-file-earmark-arrow-up display-1 text-primary"></i>
                </div>
                <h3>{{ title }}</h3>
                <p class="text-muted">Sube tu archivo Excel (.xlsx) para procesar los datos masivamente.</p>
                
                <form method="post" enctype="multipart/form-data" class="mt-4">
                    {% csrf_token %}
                    <div class="mb-4">
                        {{ form.file }}
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Procesar Archivo</button>
                        <a href="javascript:history.back()" class="btn btn-link text-decoration-none">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
